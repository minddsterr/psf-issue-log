# Render Blueprint สำหรับ PSF Issue Log
# ขึ้นฟรีที่ https://render.com  (New + → Blueprint → เชื่อม repo นี้)
services:
  - type: web
    name: psf-issue-log
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      # ใส่ connection string ของ Supabase Postgres ที่หน้า Render → Environment
      # ถ้าไม่ตั้ง ระบบจะ fallback เป็น SQLite (ข้อมูลจะไม่ถาวรบน Render free)
      - key: DATABASE_URL
        sync: false
