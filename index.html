<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSF Issue Log</title>
<style>
  :root{
    --brand:#2f6fed; --brand-dark:#1e50c8; --brand-tint:#eaf1fe;
    --bg:#eef1f6; --panel:#ffffff; --ink:#1b2437; --muted:#6b7688; --line:#e4e8ef;
    --new:#e5544b; --doing:#f0993a; --done:#37b24d;
    --shadow-sm:0 1px 2px rgba(20,30,55,.08);
    --shadow-md:0 4px 14px rgba(20,30,55,.10);
    --shadow-lg:0 10px 30px rgba(20,30,55,.16);
    /* compat aliases (โค้ดเดิมอ้างชื่อพวกนี้) */
    --blue:#2f6fed; --blue-dark:#1e50c8; --text:#1b2437; --text-light:#6b7688;
    --border:#e4e8ef; --shadow:0 1px 2px rgba(20,30,55,.08);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;font-family:"Segoe UI","Sarabun",-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);display:flex;height:100vh;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{width:270px;min-width:270px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;}
  .brand{display:flex;align-items:center;gap:11px;padding:20px 20px 16px;border-bottom:1px solid var(--line);}
  .brand .logo{
    width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--brand),#5b8ef7);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:var(--shadow-md);flex-shrink:0;
  }
  .brand .bt{font-weight:800;font-size:16px;letter-spacing:.2px;}
  .brand .bs{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .menu-label{font-size:11px;font-weight:700;color:#9aa4b4;letter-spacing:1px;text-transform:uppercase;padding:16px 22px 8px;}
  .menu-list{list-style:none;margin:0;padding:0 12px 20px;flex:1;overflow-y:auto;}
  .menu-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;cursor:pointer;font-size:14.5px;color:#3c4658;margin-bottom:2px;transition:background .12s;user-select:none;}
  .menu-item:hover{background:#f3f5f9;}
  .menu-item.active{background:var(--brand-tint);color:var(--brand-dark);font-weight:700;}
  .menu-item .mi-icon{width:34px;height:34px;border-radius:9px;background:#f1f4f8;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .menu-item.active .mi-icon{background:#fff;box-shadow:var(--shadow-sm);}
  .menu-item .mi-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .menu-item .mi-badge{background:var(--new);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 6px;flex-shrink:0;}

  /* ---------- Main ---------- */
  .board-area{flex:1;display:flex;flex-direction:column;min-width:0;}
  .board-header{display:flex;align-items:center;gap:18px;padding:18px 26px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .board-header h1{font-size:20px;margin:0;display:flex;align-items:center;gap:12px;flex:1;font-weight:800;min-width:200px;}
  .board-header h1 .bh-icon{width:40px;height:40px;border-radius:11px;background:#fdeeee;display:flex;align-items:center;justify-content:center;font-size:20px;}
  .search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:9px 14px;min-width:240px;color:var(--muted);}
  .search-box input{border:0;background:transparent;outline:0;font-size:14px;flex:1;color:var(--ink);font-family:inherit;}
  .btn{border:none;border-radius:9px;padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:background .12s,opacity .12s;}
  .btn-primary{background:var(--brand);color:#fff;}
  .btn-primary:hover{background:var(--brand-dark);}
  .btn-secondary{background:#eef1f6;color:#3c4658;}
  .btn-secondary:hover{background:#e2e7ef;}
  .btn-danger{background:#fff;color:#d64535;border:1px solid #f0c4bf;}
  .btn-danger:hover{background:#fdecea;}
  .btn-ghost{background:transparent;color:var(--muted);}
  .btn-ghost:hover{background:#f3f5f9;}

  .columns-wrap{flex:1;display:flex;gap:20px;padding:22px 26px;overflow-x:auto;overflow-y:hidden;align-items:flex-start;}
  .column{background:#e9edf3;border-radius:16px;flex:1 1 0;min-width:270px;display:flex;flex-direction:column;max-height:100%;box-shadow:inset 0 0 0 1px rgba(20,30,55,.03);}
  .column-head{display:flex;align-items:center;gap:10px;padding:15px 16px 12px;}
  .col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .column-head .col-title{font-weight:800;font-size:14.5px;flex:1;}
  .column-head .count{background:#fff;color:var(--muted);font-size:12px;font-weight:800;min-width:24px;height:22px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 8px;box-shadow:var(--shadow-sm);}
  .card-list{padding:0 12px;display:flex;flex-direction:column;gap:11px;overflow-y:auto;min-height:12px;transition:background .15s ease;}
  .card-list.drag-over{background:#dbe2ec;border-radius:12px;}

  .issue-card{background:var(--panel);border-radius:13px;box-shadow:var(--shadow-sm);padding:0;overflow:hidden;cursor:grab;border:1px solid rgba(20,30,55,.04);position:relative;transition:box-shadow .15s,transform .15s;}
  .issue-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
  .issue-card:active{cursor:grabbing;}
  .issue-card.dragging{opacity:.4;box-shadow:none;transform:scale(.98);}
  @keyframes cardSettle{0%{transform:scale(1.05);box-shadow:var(--shadow-lg);}100%{transform:scale(1);box-shadow:var(--shadow-sm);}}
  .issue-card.just-moved{animation:cardSettle .24s ease;}
  .issue-card .status-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;z-index:1;}
  .issue-card .cover{height:110px;background-size:cover;background-position:center;background-color:#dfe4ec;}
  .issue-card .card-body{padding:12px 14px 13px 17px;}
  .issue-card .chips{display:flex;gap:6px;margin-bottom:9px;flex-wrap:wrap;}
  .chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;text-decoration:none;}
  .chip.att{background:#eef1f6;color:#5b6473;}
  .chip.jira{background:#e7edfd;color:var(--brand-dark);cursor:pointer;}
  .chip.jira:hover{background:#d8e2fc;}
  .issue-card .title{font-size:14.5px;line-height:1.45;font-weight:600;margin-bottom:11px;word-break:break-word;}
  .issue-card .meta-row{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;}
  .assignee{display:flex;align-items:center;gap:6px;font-weight:600;color:#3c4658;}
  .assignee .av{width:24px;height:24px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
  .assignee.none{color:#a2abba;font-weight:500;font-style:normal;}
  .meta-row .date{margin-left:auto;white-space:nowrap;}

  .add-card-trigger{margin:6px 12px 14px;padding:11px;border-radius:11px;color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;justify-content:center;border:1.5px dashed #cdd5e0;transition:.12s;}
  .add-card-trigger:hover{background:#fff;color:var(--brand-dark);border-color:var(--brand);}
  .quick-add{margin:2px 12px 12px;display:flex;flex-direction:column;gap:8px;}
  .quick-add textarea{border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:14px;resize:none;font-family:inherit;box-shadow:var(--shadow-sm);outline:none;}
  .quick-add textarea:focus{border-color:var(--brand);}
  .quick-add .qa-actions{display:flex;gap:8px;align-items:center;}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(20,30,55,.5);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:100;}
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:700px;box-shadow:var(--shadow-lg);overflow:hidden;}
  .modal-cover{width:100%;max-height:220px;object-fit:cover;display:block;background:#dfe4ec;}
  .modal-body{padding:20px 26px 26px;}
  .modal-top{display:flex;justify-content:flex-end;}
  .modal-close{border:none;background:transparent;font-size:20px;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:8px;}
  .modal-close:hover{background:#f3f5f9;}
  .modal-title-input{width:100%;font-size:21px;font-weight:800;border:none;outline:none;padding:6px 8px;border-radius:8px;margin:2px 0 16px;font-family:inherit;color:var(--ink);}
  .modal-title-input:hover,.modal-title-input:focus{background:#f3f5f9;}
  .field-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
  .field{flex:1;min-width:150px;}
  .field label{display:block;font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
  .field select,.field input[type=text]{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;outline:none;background:#fff;}
  .field select:focus,.field input:focus{border-color:var(--brand);}
  .status-select{font-weight:700;}
  .meta-line{font-size:12.5px;color:var(--muted);margin-bottom:16px;}
  .section{margin-bottom:20px;}
  .section > label{display:block;font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;}
  .section textarea{width:100%;min-height:90px;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;resize:vertical;}
  .section textarea:focus{border-color:var(--brand);}
  .jira-row{display:flex;gap:10px;align-items:center;}
  .jira-row input{flex:1;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;outline:none;}
  .jira-row input:focus{border-color:var(--brand);}
  #jiraOpen{white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
  .attach-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
  .attach-tile{width:110px;border:1px solid var(--line);border-radius:9px;overflow:hidden;position:relative;background:#fafbfc;text-decoration:none;color:inherit;display:block;}
  .attach-tile img{width:100%;height:74px;object-fit:cover;display:block;background:#eee;}
  .attach-tile .file-icon{height:74px;display:flex;align-items:center;justify-content:center;font-size:28px;background:#eef1f4;}
  .attach-tile .fname{font-size:11px;padding:5px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .attach-tile .fsize{font-size:10px;color:var(--muted);padding:0 6px 5px;}
  .attach-remove{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.55);color:#fff;border:none;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:12px;line-height:1;}
  .attach-remove:hover{background:rgba(0,0,0,.8);}
  .modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px;gap:12px;}
  .save-area{display:flex;align-items:center;gap:12px;}
  .save-hint{font-size:13px;font-weight:700;white-space:nowrap;}
  .save-hint.unsaved{color:#e67700;}
  .save-hint.saved{color:var(--done);}
  #saveCardBtn:disabled{opacity:.45;cursor:default;}

  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:#c6cdd8;border-radius:5px;}
  ::-webkit-scrollbar-thumb:hover{background:#b3bbc9;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">
    <div class="logo">🗂️</div>
    <div>
      <div class="bt">PSF Issue Log</div>
      <div class="bs">ระบบแจ้งปัญหาการใช้งาน</div>
    </div>
  </div>
  <div class="menu-label">เมนูหลัก</div>
  <ul class="menu-list" id="menuList"></ul>
</aside>

<main class="board-area">
  <div class="board-header">
    <h1><span class="bh-icon" id="bhIcon"></span><span id="bhTitle"></span></h1>
    <div class="search-box">
      <span>🔎</span>
      <input type="text" id="searchInput" placeholder="ค้นหาการ์ดในเมนูนี้...">
    </div>
  </div>
  <div class="columns-wrap" id="columnsWrap"></div>
</main>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <img class="modal-cover" id="modalCover" style="display:none;">
    <div class="modal-body">
      <div class="modal-top">
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <input type="text" class="modal-title-input" id="fieldTitle" placeholder="ชื่อปัญหา...">
      <div class="field-row">
        <div class="field">
          <label>เมนู/ระบบ</label>
          <select id="fieldDept"></select>
        </div>
        <div class="field">
          <label>สถานะ</label>
          <select id="fieldStatus" class="status-select"></select>
        </div>
        <div class="field">
          <label>ผู้รับผิดชอบ</label>
          <select id="fieldAssignee"></select>
        </div>
        <div class="field">
          <label>ผู้แจ้ง (คนสร้าง)</label>
          <input type="text" id="fieldReporter" placeholder="ชื่อผู้แจ้ง">
        </div>
      </div>
      <div class="meta-line" id="metaLine"></div>

      <div class="section">
        <label>รายละเอียดปัญหา</label>
        <textarea id="fieldDesc" placeholder="อธิบายรายละเอียดปัญหาที่พบ..."></textarea>
      </div>

      <div class="section">
        <label>ลิงก์ Jira</label>
        <div class="jira-row">
          <input type="text" id="fieldJira" placeholder="วางลิงก์ Jira ที่นี่ เช่น https://your.atlassian.net/browse/PSF-123">
          <a id="jiraOpen" class="btn btn-secondary" target="_blank" rel="noopener" style="display:none">🔗 เปิด Jira</a>
        </div>
      </div>

      <div class="section">
        <label>รูปภาพ &amp; ไฟล์แนบ</label>
        <div class="attach-grid" id="attachGrid"></div>
        <input type="file" id="fileInput" multiple style="display:none;">
        <button class="btn btn-secondary" id="addAttachBtn">📎 แนบรูปภาพ/ไฟล์</button>
      </div>

      <div class="modal-footer">
        <button class="btn btn-danger" id="deleteCardBtn">ลบการ์ดนี้</button>
        <div class="save-area">
          <span class="save-hint" id="saveHint"></span>
          <button class="btn btn-primary" id="saveCardBtn" disabled>บันทึก</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------------- Config ----------------
  const DEPARTMENTS = [
    {key:"users",    label:"จัดการผู้ใช้งาน",        icon:"👤"},
    {key:"basedata", label:"ระบบข้อมูลพื้นฐาน",       icon:"📄"},
    {key:"admin",    label:"ระบบงานบริหาร",          icon:"🗂️"},
    {key:"audit",    label:"ระบบงานตรวจสอบ",         icon:"🔍"},
    {key:"revenue",  label:"ระบบงานรายได้",          icon:"💵"},
    {key:"loan",     label:"ระบบรายได้เงินกู้",       icon:"🏦"},
    {key:"budget",   label:"ระบบงบประมาณ",           icon:"📊"},
    {key:"finance",  label:"ระบบงานการเงิน",         icon:"🏛️"},
    {key:"account",  label:"ระบบงานบัญชี",           icon:"🧮"},
    {key:"legal",    label:"ฝ่ายกฎหมาย",             icon:"⚖️"},
  ];
  const STATUSES = [
    {key:"new",   label:"แจ้งปัญหาใหม่",     color:"#e5544b"},
    {key:"doing", label:"กำลังดำเนินการ",    color:"#f0993a"},
    {key:"done",  label:"แก้ไขแล้ว",         color:"#37b24d"},
  ];
  const ASSIGNEES = [
    {key:"mind",    label:"mind",    color:"#e84393"},  // ชมพู
    {key:"sarobia", label:"sarobia", color:"#2f6fed"},  // ฟ้า
  ];

  let currentDept = localStorage.getItem("it_lastDept") || DEPARTMENTS[0].key;
  let currentCardId = null;
  let cardsCache = [];
  let dragState = null;
  let pollTimer = null;
  let modalDirty = false;
  let modalOriginal = null;

  // ---------------- API ----------------
  const api = {
    async getCards(){ const r = await fetch("/api/cards"); return r.json(); },
    async createCard(payload){
      const r = await fetch("/api/cards", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)});
      return r.json();
    },
    async updateCard(id, patch){
      const r = await fetch(`/api/cards/${id}`, {method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify(patch)});
      return r.json();
    },
    async deleteCard(id){ await fetch(`/api/cards/${id}`, {method:"DELETE"}); },
    async reorder(items){
      await fetch("/api/cards/reorder", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(items)});
    },
    async uploadAttachments(cardId, files){
      const form = new FormData();
      files.forEach(f => form.append("files", f));
      const r = await fetch(`/api/cards/${cardId}/attachments`, {method:"POST", body:form});
      return r.json();
    },
    async deleteAttachment(id){ await fetch(`/api/attachments/${id}`, {method:"DELETE"}); },
  };

  // ---------------- Helpers ----------------
  function deptInfo(key){ return DEPARTMENTS.find(d => d.key === key) || DEPARTMENTS[0]; }
  function statusInfo(key){ return STATUSES.find(s => s.key === key) || STATUSES[0]; }
  function assigneeInfo(key){ return ASSIGNEES.find(a => a.key === key) || null; }
  function fmtDate(iso){
    const d = new Date(iso);
    return d.toLocaleString("th-TH", {day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit"});
  }
  function fmtSize(bytes){
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
    return (bytes/1024/1024).toFixed(1) + " MB";
  }
  function isImage(type){ return type && type.startsWith("image/"); }
  function escapeHtml(s){
    return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function normalizeUrl(u){
    u = (u || "").trim();
    if (!u) return "";
    if (!/^https?:\/\//i.test(u)) return "https://" + u;
    return u;
  }
  function cardsForDept(key){
    return cardsCache.filter(c => c.department === key).sort((a,b) => a.position - b.position);
  }

  // ---------------- Sidebar ----------------
  function renderSidebar(){
    const ul = document.getElementById("menuList");
    ul.innerHTML = "";
    DEPARTMENTS.forEach(dep => {
      const newCount = cardsCache.filter(c => c.department === dep.key && c.status === "new").length;
      const li = document.createElement("li");
      li.className = "menu-item" + (dep.key === currentDept ? " active" : "");
      li.innerHTML = `
        <span class="mi-icon">${dep.icon}</span>
        <span class="mi-label">${dep.label}</span>
        ${newCount ? `<span class="mi-badge">${newCount}</span>` : ""}
      `;
      li.addEventListener("click", () => {
        currentDept = dep.key;
        localStorage.setItem("it_lastDept", dep.key);
        document.getElementById("searchInput").value = "";
        renderAll();
      });
      ul.appendChild(li);
    });
  }

  // ---------------- Board / Columns ----------------
  function renderBoard(){
    const dep = deptInfo(currentDept);
    document.getElementById("bhIcon").textContent = dep.icon;
    document.getElementById("bhTitle").textContent = dep.label;

    const wrap = document.getElementById("columnsWrap");
    wrap.innerHTML = "";

    const query = document.getElementById("searchInput").value.trim().toLowerCase();
    let cards = cardsForDept(currentDept);
    if (query) {
      cards = cards.filter(c =>
        c.title.toLowerCase().includes(query) ||
        (c.description || "").toLowerCase().includes(query)
      );
    }

    STATUSES.forEach(st => {
      const col = document.createElement("div");
      col.className = "column";
      col.dataset.status = st.key;
      const stCards = cards.filter(c => c.status === st.key);

      col.innerHTML = `
        <div class="column-head">
          <span class="col-dot" style="background:${st.color}"></span>
          <span class="col-title">${st.label}</span>
          <span class="count">${stCards.length}</span>
        </div>
        <div class="card-list" data-status="${st.key}"></div>
      `;

      const list = col.querySelector(".card-list");
      stCards.forEach(card => list.appendChild(renderCardEl(card)));
      setupColumnDnD(list, st.key);

      const trigger = document.createElement("div");
      trigger.className = "add-card-trigger";
      trigger.textContent = "＋ เพิ่มการ์ด";
      trigger.addEventListener("click", () => showQuickAdd(col, st.key));
      col.appendChild(trigger);

      wrap.appendChild(col);
    });
  }

  function renderCardEl(card){
    const el = document.createElement("div");
    el.className = "issue-card";
    el.draggable = true;
    el.dataset.id = card.id;

    const st = statusInfo(card.status);
    const coverAtt = (card.attachments || []).find(a => isImage(a.type));
    const coverHtml = coverAtt ? `<div class="cover" style="background-image:url('${coverAtt.url}')"></div>` : "";
    const attCount = (card.attachments || []).length;
    const asg = assigneeInfo(card.assignee);

    const chips = [];
    if (card.jira_url) chips.push(`<a class="chip jira" data-nodrag draggable="false">🔗 Jira</a>`);
    if (attCount) chips.push(`<span class="chip att">📎 ${attCount}</span>`);

    const assigneeHtml = asg
      ? `<span class="assignee"><span class="av" style="background:${asg.color}">${escapeHtml(asg.label.charAt(0).toUpperCase())}</span>${escapeHtml(asg.label)}</span>`
      : `<span class="assignee none">ยังไม่มอบหมาย</span>`;

    el.innerHTML = `
      <span class="status-stripe" style="background:${st.color}"></span>
      ${coverHtml}
      <div class="card-body">
        ${chips.length ? `<div class="chips">${chips.join("")}</div>` : ""}
        <div class="title"></div>
        <div class="meta-row">
          ${assigneeHtml}
          <span class="date">${fmtDate(card.created_at)}</span>
        </div>
      </div>
    `;
    el.querySelector(".title").textContent = card.title;

    const jiraLink = el.querySelector(".chip.jira");
    if (jiraLink) {
      jiraLink.href = normalizeUrl(card.jira_url);
      jiraLink.target = "_blank";
      jiraLink.rel = "noopener";
      jiraLink.addEventListener("click", (e) => e.stopPropagation());
    }

    el.addEventListener("click", (e) => {
      if (dragState) return;
      if (e.target.closest("[data-nodrag]")) return;
      openModal(card.id);
    });
    el.addEventListener("dragstart", (e) => {
      dragState = {id: card.id, fromStatus: card.status};
      el.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      stopPolling();
    });
    el.addEventListener("dragend", () => {
      el.classList.remove("dragging");
      dragState = null;
      document.querySelectorAll(".card-list.drag-over").forEach(l => l.classList.remove("drag-over"));
      startPolling();
    });

    return el;
  }

  function setupColumnDnD(listEl, statusKey){
    listEl.addEventListener("dragover", (e) => {
      if (!dragState) return;
      e.preventDefault();
      listEl.classList.add("drag-over");
      const after = getDragAfterElement(listEl, e.clientY);
      const dragEl = document.querySelector(`.issue-card[data-id="${dragState.id}"]`);
      if (!dragEl) return;
      if (after == null) listEl.appendChild(dragEl);
      else listEl.insertBefore(dragEl, after);
    });
    listEl.addEventListener("dragleave", (e) => {
      if (e.target === listEl) listEl.classList.remove("drag-over");
    });
    listEl.addEventListener("drop", async (e) => {
      e.preventDefault();
      listEl.classList.remove("drag-over");
      if (!dragState) return;
      await commitReorder(listEl, statusKey);
    });
  }

  function getDragAfterElement(container, y){
    const els = [...container.querySelectorAll(".issue-card:not(.dragging)")];
    return els.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height/2;
      if (offset < 0 && offset > closest.offset) return {offset, element: child};
      return closest;
    }, {offset: -Infinity, element: null}).element;
  }

  async function commitReorder(listEl, newStatus){
    const movedId = dragState ? dragState.id : null;
    const dragEl = movedId ? document.querySelector(`.issue-card[data-id="${movedId}"]`) : null;

    const ids = [...listEl.querySelectorAll(".issue-card")].map(el => Number(el.dataset.id));
    const items = [];
    ids.forEach((id, idx) => {
      const card = cardsCache.find(c => c.id === id);
      if (!card) return;
      card.position = idx;
      card.status = newStatus;
      items.push({id, status: newStatus, position: idx});
    });

    if (dragEl) {
      const stripe = dragEl.querySelector(".status-stripe");
      if (stripe) stripe.style.background = statusInfo(newStatus).color;
      dragEl.classList.remove("just-moved");
      void dragEl.offsetWidth;
      dragEl.classList.add("just-moved");
      setTimeout(() => dragEl.classList.remove("just-moved"), 260);
    }
    refreshCounts();
    try { await api.reorder(items); } catch (e) { /* poll ครั้งถัดไป sync ให้ */ }
  }

  function refreshCounts(){
    document.querySelectorAll(".column").forEach(col => {
      const n = col.querySelectorAll(".card-list .issue-card").length;
      const countEl = col.querySelector(".column-head .count");
      if (countEl) countEl.textContent = n;
    });
    renderSidebar();
  }

  // ---------------- Quick add ----------------
  function showQuickAdd(colEl, statusKey){
    const existing = colEl.querySelector(".quick-add");
    if (existing) { existing.querySelector("textarea").focus(); return; }
    const trigger = colEl.querySelector(".add-card-trigger");
    trigger.style.display = "none";
    stopPolling();

    const box = document.createElement("div");
    box.className = "quick-add";
    box.innerHTML = `
      <textarea rows="2" placeholder="พิมพ์หัวข้อปัญหา..."></textarea>
      <div class="qa-actions">
        <button class="btn btn-primary" id="qaSave">เพิ่มการ์ด</button>
        <button class="btn btn-ghost" id="qaCancel">✕</button>
      </div>
    `;
    colEl.appendChild(box);
    const ta = box.querySelector("textarea");
    ta.focus();

    function cancel(){ box.remove(); trigger.style.display = "flex"; startPolling(); }
    box.querySelector("#qaCancel").addEventListener("click", cancel);
    box.querySelector("#qaSave").addEventListener("click", save);
    ta.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); save(); }
      if (e.key === "Escape") cancel();
    });

    async function save(){
      const title = ta.value.trim();
      if (!title) { cancel(); return; }
      const card = await api.createCard({department: currentDept, status: statusKey, title});
      cardsCache.push(card);
      box.remove();
      trigger.style.display = "flex";
      startPolling();
      renderAll(false);
    }
  }

  document.getElementById("searchInput").addEventListener("input", () => renderBoard());

  // ---------------- Modal ----------------
  const overlay = document.getElementById("overlay");
  const fieldDeptSel = document.getElementById("fieldDept");
  const fieldStatusSel = document.getElementById("fieldStatus");
  const fieldAssigneeSel = document.getElementById("fieldAssignee");
  const fieldJira = document.getElementById("fieldJira");
  const jiraOpen = document.getElementById("jiraOpen");

  DEPARTMENTS.forEach(d => {
    const o = document.createElement("option");
    o.value = d.key; o.textContent = `${d.icon} ${d.label}`;
    fieldDeptSel.appendChild(o);
  });
  STATUSES.forEach(s => {
    const o = document.createElement("option");
    o.value = s.key; o.textContent = s.label;
    fieldStatusSel.appendChild(o);
  });
  // ผู้รับผิดชอบ: ไม่ระบุ + รายชื่อ
  const noneOpt = document.createElement("option");
  noneOpt.value = ""; noneOpt.textContent = "— ยังไม่มอบหมาย —";
  fieldAssigneeSel.appendChild(noneOpt);
  ASSIGNEES.forEach(a => {
    const o = document.createElement("option");
    o.value = a.key; o.textContent = a.label;
    fieldAssigneeSel.appendChild(o);
  });

  function openModal(cardId){
    currentCardId = cardId;
    const card = cardsCache.find(c => c.id === cardId);
    if (!card) return;

    document.getElementById("fieldTitle").value = card.title;
    fieldDeptSel.value = card.department;
    fieldStatusSel.value = card.status;
    fieldAssigneeSel.value = card.assignee || "";
    document.getElementById("fieldReporter").value = card.reporter || "";
    document.getElementById("fieldDesc").value = card.description || "";
    fieldJira.value = card.jira_url || "";
    updateJiraOpen();
    document.getElementById("metaLine").textContent =
      `สร้างเมื่อ ${fmtDate(card.created_at)} · แก้ไขล่าสุด ${fmtDate(card.updated_at)}`;

    renderAttachments(card);
    renderCover(card);

    modalOriginal = {department: card.department, status: card.status};
    setDirty(false);

    overlay.classList.add("open");
    stopPolling();
  }

  const saveBtn = document.getElementById("saveCardBtn");
  const saveHint = document.getElementById("saveHint");

  function setDirty(dirty){
    modalDirty = dirty;
    saveBtn.disabled = !dirty;
    if (dirty) { saveHint.textContent = "มีการแก้ไขที่ยังไม่บันทึก"; saveHint.className = "save-hint unsaved"; }
    else { saveHint.textContent = ""; saveHint.className = "save-hint"; }
  }

  function updateJiraOpen(){
    const v = fieldJira.value.trim();
    if (v) { jiraOpen.href = normalizeUrl(v); jiraOpen.style.display = "inline-flex"; }
    else { jiraOpen.style.display = "none"; jiraOpen.removeAttribute("href"); }
  }

  function renderCover(card){
    const coverAtt = (card.attachments || []).find(a => isImage(a.type));
    const img = document.getElementById("modalCover");
    if (coverAtt) { img.src = coverAtt.url; img.style.display = "block"; }
    else { img.style.display = "none"; }
  }

  function renderAttachments(card){
    const grid = document.getElementById("attachGrid");
    grid.innerHTML = "";
    (card.attachments || []).forEach(att => {
      const tile = document.createElement("a");
      tile.className = "attach-tile";
      tile.href = att.url; tile.target = "_blank"; tile.rel = "noopener";
      if (!isImage(att.type)) tile.download = att.name;
      tile.innerHTML = isImage(att.type) ? `<img src="${att.url}">` : `<div class="file-icon">📄</div>`;
      tile.innerHTML += `<div class="fname">${escapeHtml(att.name)}</div><div class="fsize">${fmtSize(att.size)}</div>`;
      const rm = document.createElement("button");
      rm.className = "attach-remove"; rm.textContent = "✕";
      rm.addEventListener("click", async (e) => {
        e.preventDefault(); e.stopPropagation();
        await api.deleteAttachment(att.id);
        card.attachments = card.attachments.filter(a => a.id !== att.id);
        renderAttachments(card); renderCover(card); renderAll(false);
      });
      tile.appendChild(rm);
      grid.appendChild(tile);
    });
  }

  function closeModal(){
    if (modalDirty && !confirm("มีการแก้ไขที่ยังไม่บันทึก ต้องการปิดโดยไม่บันทึกใช่หรือไม่?")) return;
    overlay.classList.remove("open");
    currentCardId = null; modalOriginal = null;
    setDirty(false);
    startPolling();
  }
  document.getElementById("modalClose").addEventListener("click", closeModal);
  overlay.addEventListener("mousedown", (e) => { if (e.target === overlay) closeModal(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape" && overlay.classList.contains("open")) closeModal(); });

  ["fieldTitle", "fieldReporter", "fieldDesc"].forEach(id => {
    document.getElementById(id).addEventListener("input", () => setDirty(true));
  });
  fieldJira.addEventListener("input", () => { setDirty(true); updateJiraOpen(); });
  fieldDeptSel.addEventListener("change", () => setDirty(true));
  fieldStatusSel.addEventListener("change", () => setDirty(true));
  fieldAssigneeSel.addEventListener("change", () => setDirty(true));

  saveBtn.addEventListener("click", async () => {
    if (!currentCardId) return;
    const idx = cardsCache.findIndex(c => c.id === currentCardId);
    if (idx === -1) return;

    const titleEl = document.getElementById("fieldTitle");
    const title = titleEl.value.trim() || "ไม่มีชื่อ";
    titleEl.value = title;

    const patch = {
      title,
      description: document.getElementById("fieldDesc").value,
      reporter: document.getElementById("fieldReporter").value,
      department: fieldDeptSel.value,
      status: fieldStatusSel.value,
      assignee: fieldAssigneeSel.value,
      jira_url: fieldJira.value.trim(),
    };
    if (modalOriginal &&
        (patch.department !== modalOriginal.department || patch.status !== modalOriginal.status)) {
      patch.position = 999999;
    }

    saveBtn.disabled = true;
    saveBtn.textContent = "กำลังบันทึก...";
    try {
      const updated = await api.updateCard(currentCardId, patch);
      cardsCache[idx] = {...cardsCache[idx], ...updated};
      modalOriginal = {department: updated.department, status: updated.status};
      document.getElementById("metaLine").textContent =
        `สร้างเมื่อ ${fmtDate(cardsCache[idx].created_at)} · แก้ไขล่าสุด ${fmtDate(cardsCache[idx].updated_at)}`;
      renderAll(false);
      setDirty(false);
      saveHint.textContent = "บันทึกแล้ว ✓"; saveHint.className = "save-hint saved";
      setTimeout(() => { if (!modalDirty) saveHint.textContent = ""; }, 2000);
    } catch (e) {
      setDirty(true);
      alert("บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง");
    } finally {
      saveBtn.textContent = "บันทึก";
    }
  });

  document.getElementById("addAttachBtn").addEventListener("click", () => {
    document.getElementById("fileInput").click();
  });
  document.getElementById("fileInput").addEventListener("change", async (e) => {
    const files = [...e.target.files];
    e.target.value = "";
    if (!files.length) return;
    const card = cardsCache.find(c => c.id === currentCardId);
    if (!card) return;
    const newAttachments = await api.uploadAttachments(currentCardId, files);
    card.attachments = (card.attachments || []).concat(newAttachments);
    renderAttachments(card); renderCover(card); renderAll(false);
  });

  document.getElementById("deleteCardBtn").addEventListener("click", async () => {
    if (!currentCardId) return;
    if (!confirm("ลบการ์ดนี้ใช่หรือไม่? การลบไม่สามารถย้อนกลับได้")) return;
    await api.deleteCard(currentCardId);
    cardsCache = cardsCache.filter(c => c.id !== currentCardId);
    modalDirty = false;
    closeModal();
    renderAll();
  });

  // ---------------- Master render ----------------
  function renderAll(){
    renderSidebar();
    renderBoard();
  }

  // ---------------- Live sync (polling) ----------------
  function startPolling(){
    if (pollTimer) return;
    pollTimer = setInterval(async () => {
      try {
        const r = await fetch("/api/cards");
        if (!r.ok) return;
        cardsCache = await r.json();
        renderAll();
      } catch (err) { /* retry next tick */ }
    }, 5000);
  }
  function stopPolling(){ clearInterval(pollTimer); pollTimer = null; }

  // ---------------- Init ----------------
  (async function init(){
    cardsCache = await api.getCards();
    renderAll();
    startPolling();
  })();

})();
</script>
</body>
</html>
